name: PR Preview Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  pull-requests: write
  contents: read

jobs:
  cleanup:
    name: Cleanup preview deployments
    runs-on: ubuntu-latest

    # Uploaded Worker versions don't need to be cleaned up, as they are
    # removed automatically.

    steps:
      - name: 🗑️ Delete database branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch: preview/pr-${{ github.event.pull_request.number }}

      - name: 🗑️ Remove PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const commentTag = '<!-- pr-preview-deployment -->';
            const prNumber = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(commentTag));
            if (existing) {
              await github.rest.issues.deleteComment({
                ...context.repo,
                comment_id: existing.id,
              });
              console.log(`💬 PR comment removed for PR #${prNumber}`);
            } else {
              console.log(`💬 No PR comment to remove for PR #${prNumber}`);
            }
